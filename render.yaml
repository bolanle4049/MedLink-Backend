# Render blueprint: web service (Docker) + managed Postgres.
# Deploy: push to GitHub, then in Render "New +" -> "Blueprint" -> pick this repo.
# Secrets marked `sync: false` are entered once in the Render dashboard.
services:
  - type: web
    name: medlink-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ENV
        value: production
      # Secrets — set these in the Render dashboard (never commit real values).
      # DATABASE_URL = your Neon connection string (must include ?sslmode=require).
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      # Optional overrides (defaults live in src/config): ANTHROPIC_MODEL,
      # GEMINI_MODEL, AI_TEXT_PROVIDER, AI_MEDIA_PROVIDER.

# Using an external managed Postgres (Neon). If you'd rather have Render host
# the DB, add a `databases:` block and wire DATABASE_URL via fromDatabase.
