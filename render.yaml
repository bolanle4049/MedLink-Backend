# Render blueprint: web service (Docker) + managed Postgres.
# Deploy: push to GitHub, then in Render "New +" -> "Blueprint" -> pick this repo.
# Secrets marked `sync: false` are entered once in the Render dashboard.
services:
  - type: web
    name: medlink-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # DATABASE_URL is wired automatically from the managed Postgres below.
      - key: DATABASE_URL
        fromDatabase:
          name: medlink-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENV
        value: production
      # Secrets — set these in the Render dashboard (never commit real values).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      # Optional overrides (defaults live in src/config): ANTHROPIC_MODEL,
      # GEMINI_MODEL, AI_TEXT_PROVIDER, AI_MEDIA_PROVIDER.

databases:
  - name: medlink-db
    plan: free
    databaseName: medlink
